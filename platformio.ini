[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Tell the compiler exactly where to find the huge app layout file in the framework
board_build.partitions = min_spiffs.csv

; Code Compression: Optimize for smallest size (-Os) and turn off debugging
build_flags = 
    -Os
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    https://github.com/pschatzmann/ESP32-A2DP.git
    
